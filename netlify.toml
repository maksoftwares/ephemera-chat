[build]
  command = "echo 'Static site: no build required'"
  publish = "site"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
