name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "site/**"
      - ".github/workflows/build-android-apk.yml"
  pull_request:
    paths:
      - "android/**"
      - "site/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Install Android SDK
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build installable APK
        id: android_build
        shell: bash
        run: |
          set +e
          gradle -p android :app:assembleRelease --stacktrace 2>&1 | tee android-build.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: android-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when Android compilation failed
        if: steps.android_build.outputs.exit_code != '0'
        run: exit 1

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Ephemera-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ephemera-android-apk
          path: Ephemera-Android.apk
          if-no-files-found: error
          retention-days: 30
