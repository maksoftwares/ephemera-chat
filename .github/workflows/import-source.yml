name: Import Ephemera source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/import-source.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-ephemera-source
  cancel-in-progress: true

jobs:
  import-source:
    if: "!contains(github.event.head_commit.message, '[source-imported]')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ephemera-parts /tmp/ephemera-expanded
          for n in 00 01 02 03 04 05 06; do
            curl --fail --location --silent --show-error \
              "https://raw.githubusercontent.com/maksoftwares/doodle-chat/ephemera-review/.ephemera-source/part-${n}.txt" \
              --output "/tmp/ephemera-parts/part-${n}.txt"
          done
          cat /tmp/ephemera-parts/part-*.txt | tr -d '\r\n' | base64 --decode > /tmp/ephemera-source.tar.xz
          echo '83fc210ef0b8d97d4d60e6c2e0aac8bf3750ea8dc739da4376c75de37a665004  /tmp/ephemera-source.tar.xz' | sha256sum --check --strict
          tar -xJf /tmp/ephemera-source.tar.xz -C /tmp/ephemera-expanded

      - name: Replace repository with application source
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            /tmp/ephemera-expanded/ephemera-chat/ ./

      - name: Verify application
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run check

      - name: Commit complete source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Source is already current.'
          else
            git commit -m 'Add complete React WebRTC source [source-imported]'
            git push origin main
          fi
